[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
bsc = "${BSC_RPC_URL}"
bsc_testnet = "${BSC_TESTNET_RPC_URL}"

[etherscan]
bsc = { key = "${BSCSCAN_API_KEY}", chain = 56 }
bsc_testnet = { key = "${BSCSCAN_API_KEY}", chain = 97 }
