<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Background radial -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </radialGradient>

    <!-- Gold gradient for claw -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="50%" stop-color="#f0a500"/>
      <stop offset="100%" stop-color="#c47c00"/>
    </linearGradient>

    <!-- Green gradient for buy arrow -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <!-- Red gradient for hedge -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>

    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#f0a500" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c47c00" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="250" cy="230" r="168"/>
    </clipPath>
  </defs>

  <!-- Outer frame: rounded square -->
  <rect width="500" height="500" rx="52" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines (premium texture) -->
  <g stroke="#ffffff" stroke-width="0.4" opacity="0.04">
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="250" cy="230" r="180" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.7"/>
  <circle cx="250" cy="230" r="172" fill="none" stroke="#f0a500" stroke-width="0.5" opacity="0.3"/>

  <!-- Inner dark circle -->
  <circle cx="250" cy="230" r="168" fill="#0d1117" opacity="0.85"/>

  <!-- ── ICON: Bear claw + hedge arrow ── -->

  <!-- Claw 1 (left) -->
  <path d="M 175 145 C 168 160 162 185 170 210 C 175 225 182 232 188 228 C 194 224 194 212 190 198 C 186 182 186 162 192 148 Z"
        fill="url(#goldGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Claw 2 (center — extends into down arrow) -->
  <path d="M 242 132 C 235 148 230 172 236 198 C 240 215 248 224 248 248 L 240 260 L 250 278 L 260 260 L 252 248 C 252 224 260 215 264 198 C 270 172 265 148 258 132 Z"
        fill="url(#goldGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Claw 3 (right) -->
  <path d="M 308 145 C 314 162 314 182 310 198 C 306 212 306 224 312 228 C 318 232 325 225 330 210 C 338 185 332 160 325 145 Z"
        fill="url(#goldGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Knuckle bar connecting claws -->
  <rect x="172" y="137" width="156" height="22" rx="11" fill="url(#goldGrad)" filter="url(#glow)" opacity="0.9"/>

  <!-- Arrow head at bottom of center claw (hedge = short = down) -->
  <polygon points="250,295 233,268 267,268" fill="url(#redGrad)" filter="url(#glow)" opacity="0.95"/>

  <!-- Small green upward tick (buy signal, top right of ring) -->
  <g filter="url(#glow)" opacity="0.85">
    <polyline points="355,185 365,168 375,175 390,148" fill="none" stroke="url(#greenGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="390,148 382,160 395,162" fill="#4ade80"/>
  </g>

  <!-- ── WORDMARK ── -->

  <!-- CLAWHEDGE -->
  <text x="250" y="402"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="42" font-weight="900"
        fill="url(#goldGrad)"
        text-anchor="middle"
        letter-spacing="6"
        filter="url(#shadow)">CLAWHEDGE</text>

  <!-- Divider line -->
  <line x1="110" y1="416" x2="390" y2="416" stroke="#f0a500" stroke-width="0.8" opacity="0.4"/>

  <!-- Tagline -->
  <text x="250" y="438"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="13" font-weight="400"
        fill="#8b949e"
        text-anchor="middle"
        letter-spacing="4">BUY MEMES · HEDGE THE DUMP</text>

  <!-- Corner accent dots -->
  <circle cx="60" cy="60" r="3" fill="#f0a500" opacity="0.3"/>
  <circle cx="440" cy="60" r="3" fill="#f0a500" opacity="0.3"/>
  <circle cx="60" cy="440" r="3" fill="#f0a500" opacity="0.3"/>
  <circle cx="440" cy="440" r="3" fill="#f0a500" opacity="0.3"/>
</svg>
